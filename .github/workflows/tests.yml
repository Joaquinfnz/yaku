name: tests

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Instalar paquete con extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"
      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check src/ tests/
      - name: Tests rapidos (sin binarios MODFLOW)
        run: python -m pytest -m "not slow" -q
