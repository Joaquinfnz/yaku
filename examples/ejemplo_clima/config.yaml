# Ejemplo INTEGRADO clima-hidrogeologia (ejemplo_clima). Rutas relativas a esta carpeta.

proyecto:
  nombre: "ejemplo_clima"
  descripcion: "Modelo hidrogeologico transiente acoplado a clima e hidrologia"
  autor: "Joaquin Fernandez"
  fecha: "2026-06-06"

objetivos:
  proposito: "Demostrar el flujo clima -> recarga -> modelo transiente -> indices clima-hidrogeologia."
  tipo: "transient"
  escala: "local"

